name: Deploy public sample demo to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Check no real data before build
        run: pnpm run check:no-real-data

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Check no real data after build
        run: pnpm run check:no-real-data

      - name: Publish dist to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git worktree add --detach ../gh-pages-worktree
          cd ../gh-pages-worktree
          git checkout --orphan gh-pages
          git rm -rf . || true
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R "$GITHUB_WORKSPACE/dist/." .
          touch .nojekyll
          git add -A
          git commit -m "Deploy public sample demo"
          git push --force origin HEAD:gh-pages
